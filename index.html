<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Auto-upgrade any http:// subresource (e.g. user-uploaded photo URLs) to https://
         to prevent mixed-content "не защищено" warnings in the installed PWA -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Ускорение первого экрана: ранний коннект к API и CDN фото (LCP карточки) -->
    <link rel="preconnect" href="https://hwckvddevjucuzxdoqqh.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://i.ibb.co" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#16181D" />
    <meta name="description" content="Razborka.net — маркет б/у и новых запчастей от авторазборок и учёт разборки" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Razborka.net" />
    
    <!-- Шрифт: системный стек (SF Pro на Apple, Segoe UI на Windows, Roboto на Android) — без веб-шрифта -->
    <title>Razborka.net — маркет б/у запчастей от авторазборок</title>
    <!-- Проверяем наличие обновления SW (без принудительной перезагрузки) -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg) reg.update();
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
