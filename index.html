<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Auto-upgrade any http:// subresource (e.g. user-uploaded photo URLs) to https://
         to prevent mixed-content "не защищено" warnings in the installed PWA -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Система управления автосервисом: клиенты, заявки, склад, сотрудники" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Авторазборка" />
    
    <!-- Шрифт: системный стек (SF Pro на Apple, Segoe UI на Windows, Roboto на Android) — без веб-шрифта -->
    <title>Авторазборка — маркет запчастей и учёт</title>
    <!-- Apply saved theme immediately to prevent FOUC -->
    <script>
      (function(){var t=localStorage.getItem('app-theme');if(t==='dark')document.documentElement.classList.add('dark');})();
    </script>
    <!-- Проверяем наличие обновления SW (без принудительной перезагрузки) -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (reg) reg.update();
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
